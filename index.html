<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Site Lookup Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>🔎 Tra cứu trạm (Paste SMS)</h2>

<textarea id="input" placeholder="Dán SMS hoặc alarm vào đây..."></textarea>

<div class="buttons">
  <button onclick="process()">Tra cứu</button>
  <button onclick="copyResult()">Copy kết quả</button>
</div>

<pre id="output"></pre>

<script>
let mapping = {};

// 🔥 LINK GOOGLE SHEET CSV (bạn thay vào đây)
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRlirnxQ6cBiVm0Wp_zXLI3E45_t0xbAzBHAuxSRo7RTamq-hsDWS8Js9U1ELubUGYkVIjA8eAEJwb_/pub?gid=1096989540&single=true&output=csv";

// Load dữ liệu
fetch(CSV_URL)
  .then(res => res.text())
  .then(csv => {
    let rows = csv.split("\n").map(r => r.trim()).filter(r => r);

    // 👉 Lấy header
    let headers = rows[0].split(",").map(h => h.trim().toLowerCase());

    // 👉 Xác định đúng cột theo tên
    let oldIndex = headers.findIndex(h => h.includes("sitename cũ"));
    let newIndex = headers.findIndex(h => h.includes("sitename mới"));

    if (oldIndex === -1 || newIndex === -1) {
      alert("❌ Không tìm thấy cột 'Sitename cũ' hoặc 'Sitename mới'");
      return;
    }

    // 👉 Load dữ liệu
    rows.slice(1).forEach(r => {
      let cols = r.split(",");

      let oldName = cols[oldIndex]?.trim().toUpperCase();
      let newName = cols[newIndex]?.trim().toUpperCase();

      if (oldName && newName) {
        mapping[newName] = oldName;
        mapping[oldName] = newName; // tra 2 chiều
      }
    });

    console.log("✅ Loaded mapping:", Object.keys(mapping).length);
  });

// Xử lý input
function process() {
  let text = document.getElementById("input").value.toUpperCase();

  let names = text.match(/[A-Z]{2,}[A-Z0-9]*\d+/g) || [];
  names = [...new Set(names)];

  let result = names.map(n => {
    let res = mapping[n];
    return res
      ? `✅ ${n} → ${res}`
      : `❌ ${n} → NOT FOUND`;
  });

  document.getElementById("output").innerText = result.join("\n");
}

// Auto chạy khi paste
document.getElementById("input").addEventListener("input", process);

// Copy kết quả
function copyResult() {
  let text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("Đã copy!");
}
</script>

</body>
</html>
